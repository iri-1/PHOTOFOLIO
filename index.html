<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="IRI自己紹介">
  <link rel="stylesheet" href="style.css">
  <title>伊里Portfolio</title>
</head>

<body>
  <header>
    <div class="header-container" style="display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; padding: 0 2rem;">
      <h1 class="block-header" style="margin: 0; padding: 0;">
        <a href="index.html">
          <span class="color-green">P</span>ortfolio
        </a>
      </h1>
      <a href="admin.html" class="btn-admin-link" style="text-decoration: none; font-size: 0.9rem; font-weight: 700; color: var(--text-muted); border: 1px solid var(--glass-border); padding: 0.5rem 1.2rem; border-radius: 50px; transition: all 0.3s;">管理</a>
    </div>
  </header>
  <div class="block-main">
    <div class="box-profile">
      <h2 class="sub-title">
        <span class="color-green">P</span>rofile
      </h2>
      <div class="item-list">
        <img src="img/iri.png" alt="プロフィール画像">
        <b>伊里 アクバル</b>
        <span class="color-green">HTML / CSS / PHP / MySQL / Laravel / Adobe XD</span>
        <p id="news-content"> ご覧下さいまして誠にありがとうございます。<br>
        こちらのサイトは伊里の試作のために作成した作品になります。</p>
      </div>
      <ul class="icon-list">
        <li>
          <a href="">
            <img src="img/github.png" alt="Githubのアイコン">
          </a>
        </li>
        <li>
          <a href="">
            <img src="img/twitter.png" alt="twitterのアイコン">
          </a>
        </li>
      </ul>

      <!-- Date & Calendar Widget -->
      <div class="widget-container">
        <span id="current-date-time">日時を読み込み中...</span>
        <div class="calendar-widget">
          <span id="calendar-month-year"></span>
          <div id="calendar-grid" class="calendar-grid"></div>
        </div>
      </div>
    </div>

    <div class="box-main-content">
      <div class="box-news">
        <h2 class="sub-title">
          <span class="color-green">N</span>ews
        </h2>
        <div id="news-board" class="news-board">
          <!-- GASからのお知らせがここに表示されます -->
          <div class="loading-spinner">Loading News...</div>
        </div>
      </div>

      <div class="box-works">
        <h2 class="sub-title">
          <span class="color-green">W</span>orks(作品一覧)
        </h2>
        
        <ul id="works-container" class="works-list">
          <!-- 読み込み時にここに作品が追加されます -->
        </ul>
      </div>
    </div>
  </div>
  
  <footer class="block-footer">
    <div class="footer-content">
      <div class="footer-logo">
        <span class="color-green">P</span>ortfolio
      </div>
      <p>&copy; 2026 IRI AKBAR. All rights reserved.</p>
      <div class="footer-links">
        <a href="index.html">Home</a>
        <a href="admin.html">Admin</a>
      </div>
    </div>
  </footer>

  <script src="script.js"></script>
</body>

</html>
